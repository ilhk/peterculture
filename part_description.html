<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part Description</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 550px;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 32px;
            margin: 0 0 15px 0;
            color: #212529;
        }
        .description-box {
            background-color: #f1f3f5;
            border-left: 5px solid #007bff;
            padding: 20px;
            text-align: left;
            margin-bottom: 30px;
            border-radius: 4px;
        }
        p {
            color: #495057;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 10px 0;
        }
        p:last-child {
            margin-bottom: 0;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            background-color: #6c757d;
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }
        .btn:hover {
            background-color: #495057;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Part Description</h1>
        
        <!-- This is where your easy script or descriptions go -->
        <div class="description-box">
            <p><strong>Item Name:</strong> [ Enter Part Name Here ]</p>
            <p><strong>Specifications:</strong> [ Enter Dimensions, Weight, or Specs ]</p>
            <p><strong>Details:</strong> This section is ready for your text script. You can easily replace these placeholder texts later on as you learn more!</p>
        </div>

        <!-- This button links back to your main index.html page automatically -->
        <a href="index.html" class="btn">Back to Main Menu</a>
    </div>

</body>
</html>
